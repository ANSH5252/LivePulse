<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LivePulse - Secure Access</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 60' fill='none'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='0%25'%3E%3Cstop offset='0%25' stop-color='%232563eb'/%3E%3Cstop offset='50%25' stop-color='%234f46e5'/%3E%3Cstop offset='100%25' stop-color='%239333ea'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d='M 10 35 L 30 50 L 55 15 L 65 40 L 75 10 L 85 45 L 95 25 L 110 25' stroke='url(%23g)' stroke-width='15' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class', 
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        if (!('theme' in localStorage)) {
            localStorage.theme = 'dark';
        }
        if (localStorage.theme === 'dark') {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>
<body class="bg-slate-50 dark:bg-slate-900 flex items-center justify-center min-h-screen text-slate-800 dark:text-slate-100 selection:bg-indigo-500/30 transition-colors duration-300 p-4">

    <div id="login-box" class="bg-white dark:bg-slate-800 p-8 rounded-3xl shadow-2xl w-full max-w-sm border border-slate-100 dark:border-slate-700 transition-all duration-300 relative overflow-hidden">
        
        <div class="absolute -top-24 -right-24 w-48 h-48 bg-indigo-500/20 rounded-full blur-3xl pointer-events-none"></div>
        
        <div class="text-center mb-8 relative z-10">
            
            <div class="flex justify-center mb-4">
                <svg class="w-15 h-14 drop-shadow-md transform hover:scale-105 transition-transform" viewBox="0 0 120 60" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="livepulse-grad-login" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" stop-color="#2563eb" />
                            <stop offset="50%" stop-color="#4f46e5" />
                            <stop offset="100%" stop-color="#9333ea" />
                        </linearGradient>
                    </defs>
                    <path d="M 10 35 L 30 50 L 55 15 L 65 40 L 75 10 L 85 45 L 95 25 L 110 25" stroke="url(#livepulse-grad-login)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>

            <h2 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600 dark:from-indigo-400 dark:to-purple-400 tracking-tight">
                LivePulse
            </h2>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 font-medium tracking-wide">Secure Portal Access</p>
        </div>
        
        <div class="flex bg-slate-100 dark:bg-slate-900/50 p-1.5 rounded-xl mb-6 relative z-10 border border-slate-200 dark:border-slate-700">
            <button id="btn-user" onclick="switchPortal('user')" class="flex-1 py-2 text-sm font-bold rounded-lg shadow-sm bg-white dark:bg-slate-700 text-indigo-600 dark:text-indigo-400 transition-all duration-200">
                Voter
            </button>
            <button id="btn-admin" onclick="switchPortal('admin')" class="flex-1 py-2 text-sm font-bold rounded-lg text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 transition-all duration-200">
                Admin
            </button>
        </div>

        <div id="admin-badge" class="hidden text-center text-xs font-bold text-rose-600 dark:text-rose-400 bg-rose-50 dark:bg-rose-900/30 py-2.5 px-3 rounded-xl mb-4 border border-rose-100 dark:border-rose-800/50 relative z-10">
            🔒 Secure Admin Access Required
        </div>

        <form action="/login" method="POST" class="space-y-4 relative z-10">
            <div>
                <input type="text" name="username" placeholder="Username" required 
                    class="w-full px-4 py-3.5 rounded-xl bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 text-slate-800 dark:text-white placeholder-slate-400 dark:placeholder-slate-500 focus:border-indigo-500 dark:focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 dark:focus:ring-indigo-500/20 outline-none transition-all text-sm font-medium">
            </div>
            <div>
                <input type="password" name="password" placeholder="Password" required 
                    class="w-full px-4 py-3.5 rounded-xl bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 text-slate-800 dark:text-white placeholder-slate-400 dark:placeholder-slate-500 focus:border-indigo-500 dark:focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 dark:focus:ring-indigo-500/20 outline-none transition-all text-sm font-medium">
            </div>
            
            <button type="submit" id="submit-btn" 
                class="w-full mt-2 py-3.5 px-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl shadow-[0_4px_14px_0_rgba(79,70,229,0.39)] hover:shadow-[0_6px_20px_rgba(79,70,229,0.23)] transition-all transform hover:-translate-y-0.5 duration-200">
                Login to Dashboard
            </button>
        </form>
        
        <div class="text-center mt-8 relative z-10">
            <a href="/register" class="text-sm font-semibold text-indigo-600 dark:text-indigo-400 hover:text-indigo-800 dark:hover:text-indigo-300 transition-colors">
                Don't have an account? Create one.
            </a>
        </div>
    </div>

    <script>
        function switchPortal(type) {
            const btnUser = document.getElementById('btn-user');
            const btnAdmin = document.getElementById('btn-admin');
            const submitBtn = document.getElementById('submit-btn');
            const badge = document.getElementById('admin-badge');

            if (type === 'admin') {
                // Admin Styling (Rose/Red)
                btnAdmin.className = "flex-1 py-2 text-sm font-bold rounded-lg shadow-sm bg-white dark:bg-slate-700 text-rose-600 dark:text-rose-400 transition-all duration-200";
                btnUser.className = "flex-1 py-2 text-sm font-bold rounded-lg text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 transition-all duration-200 bg-transparent";
                
                submitBtn.className = "w-full mt-2 py-3.5 px-4 bg-rose-500 hover:bg-rose-600 text-white font-bold rounded-xl shadow-[0_4px_14px_0_rgba(225,29,72,0.39)] hover:shadow-[0_6px_20px_rgba(225,29,72,0.23)] transition-all transform hover:-translate-y-0.5 duration-200";
                submitBtn.innerText = "Authenticate as Admin";
                badge.classList.remove('hidden');
            } else {
                // User Styling (Indigo/Purple)
                btnUser.className = "flex-1 py-2 text-sm font-bold rounded-lg shadow-sm bg-white dark:bg-slate-700 text-indigo-600 dark:text-indigo-400 transition-all duration-200";
                btnAdmin.className = "flex-1 py-2 text-sm font-bold rounded-lg text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 transition-all duration-200 bg-transparent";
                
                submitBtn.className = "w-full mt-2 py-3.5 px-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl shadow-[0_4px_14px_0_rgba(79,70,229,0.39)] hover:shadow-[0_6px_20px_rgba(79,70,229,0.23)] transition-all transform hover:-translate-y-0.5 duration-200";
                submitBtn.innerText = "Login to Dashboard";
                badge.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
