<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LivePulse - Register</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 60' fill='none'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='0%25'%3E%3Cstop offset='0%25' stop-color='%232563eb'/%3E%3Cstop offset='50%25' stop-color='%234f46e5'/%3E%3Cstop offset='100%25' stop-color='%239333ea'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d='M 10 35 L 30 50 L 55 15 L 65 40 L 75 10 L 85 45 L 95 25 L 110 25' stroke='url(%23g)' stroke-width='15' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class', 
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        if (!('theme' in localStorage)) {
            localStorage.theme = 'dark';
        }
        if (localStorage.theme === 'dark') {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>
<body class="bg-slate-50 dark:bg-slate-900 flex items-center justify-center min-h-screen text-slate-800 dark:text-slate-100 selection:bg-indigo-500/30 transition-colors duration-300 p-4">

    <div class="bg-white dark:bg-slate-800 p-8 rounded-3xl shadow-2xl w-full max-w-sm border border-slate-100 dark:border-slate-700 transition-all duration-300 relative overflow-hidden">
        
        <div class="absolute -top-24 -right-24 w-48 h-48 bg-indigo-500/20 rounded-full blur-3xl pointer-events-none"></div>
        
        <div class="text-center mb-8 relative z-10">
            
            <div class="flex justify-center mb-4">
                <svg class="w-15 h-14 drop-shadow-md transform hover:scale-105 transition-transform" viewBox="0 0 120 60" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="livepulse-grad-register" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" stop-color="#2563eb" />
                            <stop offset="50%" stop-color="#4f46e5" />
                            <stop offset="100%" stop-color="#9333ea" />
                        </linearGradient>
                    </defs>
                    <path d="M 10 35 L 30 50 L 55 15 L 65 40 L 75 10 L 85 45 L 95 25 L 110 25" stroke="url(#livepulse-grad-register)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>

            <h2 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600 dark:from-indigo-400 dark:to-purple-400 tracking-tight">
                LivePulse
            </h2>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 font-medium tracking-wide">
                Create an account to receive your event ticket.
            </p>
        </div>

        <form action="/register" method="POST" class="space-y-4 relative z-10">
            <div>
                <input type="text" name="username" placeholder="Choose a Username" required 
                    class="w-full px-4 py-3.5 rounded-xl bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 text-slate-800 dark:text-white placeholder-slate-400 dark:placeholder-slate-500 focus:border-indigo-500 dark:focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 dark:focus:ring-indigo-500/20 outline-none transition-all text-sm font-medium">
            </div>
            <div>
                <input type="email" name="email" placeholder="Your Email Address" required 
                    class="w-full px-4 py-3.5 rounded-xl bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 text-slate-800 dark:text-white placeholder-slate-400 dark:placeholder-slate-500 focus:border-indigo-500 dark:focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 dark:focus:ring-indigo-500/20 outline-none transition-all text-sm font-medium">
            </div>
            <div>
                <input type="password" name="password" placeholder="Create a Password" required 
                    class="w-full px-4 py-3.5 rounded-xl bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 text-slate-800 dark:text-white placeholder-slate-400 dark:placeholder-slate-500 focus:border-indigo-500 dark:focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 dark:focus:ring-indigo-500/20 outline-none transition-all text-sm font-medium">
            </div>
            
            <button type="submit" 
                class="w-full mt-4 py-3.5 px-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl shadow-[0_4px_14px_0_rgba(79,70,229,0.39)] hover:shadow-[0_6px_20px_rgba(79,70,229,0.23)] transition-all transform hover:-translate-y-0.5 duration-200">
                Register for Event
            </button>
        </form>
        
        <div class="text-center mt-8 relative z-10">
            <a href="/login" class="text-sm font-semibold text-indigo-600 dark:text-indigo-400 hover:text-indigo-800 dark:hover:text-indigo-300 transition-colors">
                Already have an account? Login here.
            </a>
        </div>
    </div>

</body>
</html>
